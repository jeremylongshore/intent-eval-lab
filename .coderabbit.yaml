# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit — intent-eval-lab (Intent Eval Platform). Semantic AI code review. Three
# non-overlapping layers: L1 deterministic CI (prettier/markdownlint/yamllint/
# actionlint/typos/lychee/ruff) owns style; CodeRabbit (here) owns semantic
# review; CodeQL (security-extended) owns security. CodeRabbit's built-in linters
# are disabled so it never re-reports what L1 already gates. Terse, assertive,
# findings-only. gitleaks (CodeRabbit-native secret scan) stays ON.
language: en-US
tone_instructions: "Be terse and technical. No preamble, praise, poems, or summaries — findings only: the problem, the file and line, the concrete fix. Flag every real issue; never soft-pedal or skip. Hardcore code review, not a status report."
reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: false
  changed_files_summary: false
  sequence_diagrams: false
  poem: false
  review_status: false
  in_progress_fortune: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  tools:
    eslint:
      enabled: false
    ruff:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
  path_filters:
    - "!**/dist/**"
    - "!**/node_modules/**"
    - "!**/coverage/**"
    - "!**/*.snap"
    - "!**/*.lock"
    - "!pnpm-lock.yaml"
  path_instructions:
    - path: "**/{schemas,specs,scripts,src}/**"
      instructions: >-
        intent-eval-lab is the methodology + spec repo. The kernel @intentsolutions/core is
        the single source of truth for schemas; this repo's schema files are redirect stubs
        ($ref to the kernel). Flag, by priority: (1) a schema here that RE-DECLARES a
        kernel-owned shape instead of $ref-ing it (schema-canonicality violation — the
        schema-drift CI gate exists for exactly this). (2) an Evidence-Bundle or
        gate-result/v1 contract example/spec that diverges from the kernel's normative
        shape (field names, required/optional, predicate URI host — predicate URIs live ONLY
        at evals.intentsolutions.io, NEVER labs.intentsolutions.io). (3) a Python script
        (codegen, drift-check, sign-evidence) that silently no-ops or fails-open. (4) a
        normative doc claiming an invariant the schema/code does not enforce. Prose STYLE
        (wording, grammar) is owned by Vale/markdownlint — do not duplicate those here.
    - path: "**/*.{sh,yml,yaml}"
      instructions: >-
        Flag drift-watch / schema-drift / sign-evidence CI scripts that silently no-op or
        fail-open, and unsafe bash array expansion under `set -u`.
chat:
  auto_reply: true
