# bbb-seed-v1 — golden question bank
#
# PROVENANCE: every question here is lifted VERBATIM from the hand-labeled `governed-brain-v1`
# dataset at bobs-big-brain-registrar
# `packages/qmd-adapter/src/eval/datasets/governed-brain-v1.ts` (42 queries: 14 lexical,
# 28 semantic). Those queries and their gold labels are ALREADY PUBLIC — that repo is public —
# so re-stating them here publishes nothing new. Only the CORPUS they are answered against is
# subject to the sanitization question (see ALLOWLIST.md).
#
# Queries are stratified lexical (exact term — BM25's home turf) vs semantic (paraphrase that
# avoids the target's headline keywords), weighted toward semantic because that is the stratum
# where the recall wall shows up. `notes` preserves the empirical observation at label time,
# INCLUDING recorded BM25 misses (q15, q29) — a miss on a valid query is evidence, not a defect
# to be relabelled away.
#
# STATUS FIELD — this bank is not fully runnable yet, and says so rather than quietly shrinking:
#   active     gold document(s) present in the candidate corpus; scoreable today.
#   blocked    gold document was REFUSED by ALLOWLIST.md Rule 2 and escalated for human
#              adjudication. Unanswerable until adjudicated. Do NOT score these — a query whose
#              gold is absent from the corpus scores 0 recall for a reason that has nothing to
#              do with retrieval quality, and averaging it in would understate the system.
#   unlabelled no gold documents in the source dataset; cannot be scored for recall at all.
#
# Bumping any question's content is a breaking change to the bank: bump `version` and rev the
# directory (bbb-seed-v2) so prior runs stay comparable against v1 specifically.

