name: Python Tests

on:
  pull_request:
    paths:
      - "research/phase-a-0-baseline/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/python-tests.yml"
  push:
    branches: [main]
    paths:
      - "research/phase-a-0-baseline/**/*.py"

permissions:
  contents: read

concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (research/phase-a-0-baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install --no-cache-dir pytest pyyaml
      - name: Run pytest (pure-logic + smoke)
        run: pytest research/phase-a-0-baseline/tests/ -v --tb=short
