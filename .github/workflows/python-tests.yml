name: Python Tests

on:
  # Required branch-protection gate: the `ruff lint + format` job runs on EVERY
  # PR to main, not just PRs that touch Python paths. A path-filtered required
  # check is SKIPPED on unrelated PRs and never reports, blocking the PR
  # forever. The push: trigger keeps its path filter (no required-check
  # semantics on push). mypy + pytest stay advisory (continue-on-error in their
  # jobs) — they may run on every PR but never block.
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "research/phase-a-0-baseline/**/*.py"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: python-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # L2 lint + format (REQUIRED) and type-check (mypy stays advisory — gradual
  # typing; the runners import third-party SDKs without stubs in all envs).
  # ---------------------------------------------------------------------------
  lint:
    name: ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install --no-cache-dir 'ruff>=0.8.4'
      - run: ruff check research/phase-a-0-baseline/scripts/ research/phase-a-0-baseline/tests/
      - run: ruff format --check research/phase-a-0-baseline/scripts/ research/phase-a-0-baseline/tests/

  typecheck:
    name: mypy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install --no-cache-dir 'mypy>=1.18' pyyaml pytest
      - run: mypy research/phase-a-0-baseline/scripts/

  # ---------------------------------------------------------------------------
  # L3 unit tests (the required signal) + ADVISORY subprocess coverage.
  # ---------------------------------------------------------------------------
  pytest:
    name: pytest + coverage (research/phase-a-0-baseline)
    runs-on: ubuntu-latest
    # Coverage here is ADVISORY BY DESIGN (continue-on-error), not a gate. The
    # floor lives in pyproject.toml ([tool.coverage.report] fail_under = 60) and
    # applies to LOCAL runs, where the real ~66-68% is measurable; the CI step
    # below passes --fail-under=0 to switch it off HERE ONLY. Without that, the
    # config floor applied to CI's environment-limited ~40% and the job failed on
    # every single PR — a permanently-red lane nobody reads, which is worse than
    # no lane. (bd_000-projects-n6ueg closed this as "documented advisory-by-
    # design", but only the comment landed; the config was never reconciled, so
    # the contradiction shipped.) The smoke tests shell out via
    # subprocess to the arm-runner scripts (run-arm-a.py / run-arm-b.py /
    # analyze.py); in CI those children short-circuit early because the two
    # external dependencies they need are absent:
    #   1. the cross-repo IS validator + fixtures (Makefile FIXTURE_DIR →
    #      ~/000-projects/claude-code-plugins/tests/fixtures/skill-frontmatter),
    #      not checked out in this repo's CI, and
    #   2. real model-provider keys (NVIDIA_API_KEY / GROQ_API_KEY / ANTHROPIC).
    # So the arm-script bodies don't execute under coverage in CI (~40%) the way
    # they do locally (~66-68%). That is an ENVIRONMENT limit — not a coverage
    # bug and not "process-init timing" (an earlier, wrong hypothesis). The 62
    # unit tests ALWAYS run and pass; that pass/fail is the real signal and the
    # `ruff lint + format` job above is the required Python gate. Making CI
    # measure the real ~66% would mean stubbing the cross-repo validator AND
    # every model provider — i.e. mocking the very integration the suite exists
    # to exercise. The honest call is to keep coverage advisory (tracked
    # bd_000-projects-n6ueg), not to fake a number or add exclusions.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --no-cache-dir 'pytest>=8' 'pytest-cov>=5' 'coverage>=7' pyyaml
      - name: Run pytest with subprocess-aware coverage
        env:
          # Tells child Pythons (subprocess.run from smoke tests) to auto-init
          # coverage. sitecustomize.py at repo root reads this and registers.
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          # Make sitecustomize.py findable by child Pythons via PYTHONPATH
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # A test FAILURE still fails this step — `coverage run -m pytest`
          # propagates pytest's exit code, and that pass/fail is the real signal.
          coverage run -m pytest research/phase-a-0-baseline/tests/ -v --tb=short
          coverage combine
          # --fail-under=0 overrides pyproject's fail_under=60 for CI only; see
          # the job comment. The percentage is still printed and still uploaded
          # to Codecov, so the number remains visible — it just stops asserting a
          # floor this environment is structurally unable to reach.
          coverage report --fail-under=0
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          fail_ci_if_error: false
