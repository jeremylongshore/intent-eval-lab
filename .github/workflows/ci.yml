name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-docs:
    name: Validate specs and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validators
        run: python3 -m pip install --quiet pyyaml jsonschema

      - name: JSON Schema syntax (specs/**/schema/*.json)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          found=0
          for f in specs/**/schema/*.json; do
            found=1
            echo "→ $f"
            python3 -c "import json; json.load(open('$f'))"
          done
          if [ "$found" -eq 0 ]; then
            echo "No schema files found — pass."
          fi

      - name: YAML syntax (specs/**/*.yaml)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          found=0
          for f in specs/**/*.yaml; do
            found=1
            echo "→ $f"
            python3 -c "import yaml; yaml.safe_load(open('$f'))"
          done
          if [ "$found" -eq 0 ]; then
            echo "No yaml files in specs — pass."
          fi

      - name: JSON syntax (specs/**/examples/*.json)
        shell: bash
        run: |
          set -e
          shopt -s globstar nullglob
          found=0
          for f in specs/**/examples/*.json; do
            found=1
            echo "→ $f"
            python3 -c "import json; json.load(open('$f'))"
          done
          if [ "$found" -eq 0 ]; then
            echo "No JSON example files — pass."
          fi

      - name: Drift-classification eval set (frozen-manifest integrity + scorer self-test)
        shell: bash
        run: |
          set -e
          python3 scripts/drift-eval-runner.py --verify-manifest
          python3 scripts/drift-eval-runner.py --self-test

      - name: Partner-name leak check (specs only)
        shell: bash
        run: |
          set -e
          if [ -d specs ]; then
            if grep -ril -E "Kobiton|Polygon|Nixtla|Lit Protocol|Mudit Gupta" specs/ ; then
              echo "::error::Partner name leaked into specs/. Specs must be vendor-generic per ISEDC v1 Q2."
              exit 1
            fi
            echo "✓ no partner-name leaks in specs/"
          else
            echo "specs/ does not exist yet — pass"
          fi

      # Offline + deterministic: the surface registry must equal the watcher's
      # SOURCES array, every extractor must exist, and every monitored surface
      # must carry a valid capture config (kind, expect_regex, min_bytes, ext).
      - name: Upstream-surface registry consistency
        run: python3 scripts/check-surface-registry.py

      # Offline + deterministic: fixtures exercise all 6 fetch-taxonomy statuses
      # (FETCH_OK|UNREACHABLE|MOVED|RATELIMITED|SHAPE_CHANGED|TRUNCATED) plus the
      # tier-1 append/dedup, tier-2 FETCH_OK-only gating (052-AT-SPEC), and the
      # snapshot-updated lineage emission on tier-2 promotion (054-AT-SPEC).
      - name: Fetch-capture taxonomy self-test
        run: python3 scripts/fetch-capture.py --self-test

      # Offline + deterministic (054-AT-SPEC): the append-only lineage log must
      # schema-validate (sequential event_ids, monotonic timestamps); the
      # committed coverage map must be a FRESH derivation of the log (it is a
      # derived projection, never hand-maintained — the check fails if stale);
      # and the self-test proves append/verify/project plus the staleness and
      # tamper failure modes.
      - name: Lineage log verify + projection freshness + self-test
        run: |
          python3 scripts/lineage-log.py verify
          python3 scripts/lineage-log.py project-coverage --check
          python3 scripts/lineage-log.py --self-test

      # Offline + deterministic: the LLM-classifier deterministic walls
      # (055-AT-SPEC). Fixture rows exercise accept plus every reject class —
      # pre-wall substring violation, output-contract schema violation,
      # forbidden action (kernel_schema_edit / close_drift_signal NEVER),
      # tier-not-earned — and the recall-floor + post-wall hook interfaces via
      # stubs. scripts/drift-eval-runner.py is only ever invoked behind a
      # file-existence guard, so this is green before and after that lands.
      - name: Classifier-walls self-test
        run: python3 scripts/classifier-walls.py --self-test

      # Offline + deterministic (056-AT-SPEC): the mcp-config deep capture.
      # --check re-extracts the normative projection from the vendored
      # snapshots (specs/_vendor/upstream/mcp-config/) and fails if the
      # committed projection.json is stale (it is DERIVED, never hand-edited);
      # the self-test proves every extraction anchor on fixtures and
      # cross-checks the projection against the kernel's upstream-base
      # mcp-config expectations — agreements AND divergences are printed, and
      # divergences are findings to report, never kernel edits (tier-3
      # promotion is human, 052-AT-SPEC). CI never refetches: the capture is
      # a one-time build-time fetch; ongoing freshness is the watcher's job.
      - name: MCP deep-capture projection freshness + self-test
        run: |
          python3 scripts/extract-mcp-projection.py --check
          python3 scripts/extract-mcp-projection.py --self-test

      # Offline + deterministic (057-AT-SPEC): the detector-health composite
      # dashboard leads with DETECTOR HEALTH — never a vanity green drift count
      # that masks a dead watcher (Gregg correction, 9k5h.13). --self-test
      # proves the verdict logic on fixtures (healthy, dead-watcher > 26h,
      # fetch-error streak >= 3, coverage gap, failing-conditions-named-first);
      # --check fails when the committed specs/detector-health.json or
      # docs/detector-health.md is stale vs its sources (re-derived at the
      # committed evaluated_at — the lineage project-coverage --check pattern).
      # If this fails after editing the registry / baselines / liveness state,
      # regenerate: python3 scripts/detector-health.py
      - name: Detector-health composite self-test + freshness
        run: |
          python3 scripts/detector-health.py --self-test
          python3 scripts/detector-health.py --check

      # Offline + deterministic (058-AT-SPEC): the plugin-manifest deep
      # capture. Unlike mcp-config there is NO machine-readable upstream —
      # the plugins-reference page is the spec and 5 commit-pinned sample
      # manifests from the official plugins repo corroborate it. --check
      # re-extracts the normative projection from the vendored snapshots
      # (specs/_vendor/upstream/plugin-manifest/) and fails if the committed
      # projection.json is stale (it is DERIVED, never hand-edited); the
      # self-test proves every extraction anchor on fixtures (tables,
      # escaped-pipe types, dotted fields, enum clauses, tolerance sentences,
      # documented-vs-observed-in-samples provenance) and cross-checks the
      # projection against the kernel's upstream-base plugin-manifest
      # expectations — agreements AND divergences are printed, and
      # divergences are findings to report, never kernel edits (tier-3
      # promotion is human, 052-AT-SPEC). CI never refetches: the capture is
      # a one-time build-time fetch; ongoing freshness is the watcher's job.
      - name: Plugin-manifest deep-capture projection freshness + self-test
        run: |
          python3 scripts/extract-plugin-manifest-projection.py --check
          python3 scripts/extract-plugin-manifest-projection.py --self-test

      # Offline + deterministic (059-AT-SPEC): the agent-definition deep
      # capture. Like plugin-manifest there is NO machine-readable upstream —
      # the sub-agents reference page is the spec and 5 commit-pinned sample
      # agents/*.md files from the official plugins repo corroborate it
      # (additional deviation: the frontmatter table documents no per-field
      # types, so value-shape facts come from the page's YAML example).
      # --check re-extracts the normative projection from the vendored
      # snapshots (specs/_vendor/upstream/agent-definition/) and fails if the
      # committed projection.json is stale (it is DERIVED, never hand-edited);
      # the self-test proves every extraction anchor on fixtures (the
      # Field|Required|Description table, closed-set enum clauses vs the open
      # model clause, Set-to single values, the YAML-example wire forms, the
      # documented-vs-observed-in-samples provenance) and cross-checks the
      # projection against the kernel's upstream-base agent-definition
      # expectations — agreements AND divergences are printed, and
      # divergences are findings to report, never kernel edits (tier-3
      # promotion is human, 052-AT-SPEC). CI never refetches: the capture is
      # a one-time build-time fetch; ongoing freshness is the watcher's job.
      - name: Agent-definition deep-capture projection freshness + self-test
        run: |
          python3 scripts/extract-agent-definition-projection.py --check
          python3 scripts/extract-agent-definition-projection.py --self-test

      # Offline + deterministic (060-AT-SPEC): the hook-config deep capture.
      # Like plugin-manifest and agent-definition there is NO machine-readable
      # upstream — the hooks reference page is the spec (the 30-event
      # lifecycle table, the three-levels-of-nesting config statement, the
      # matcher-pattern tables, the five handler-field tables) and 4
      # commit-pinned hooks/hooks.json files from the official plugins repo
      # corroborate it (the settings page is vendored as supporting authority
      # because the hooks page references it for hooks-block placement).
      # --check re-extracts the normative projection from the vendored
      # snapshots (specs/_vendor/upstream/hook-config/) and fails if the
      # committed projection.json is stale (it is DERIVED, never hand-edited);
      # the self-test proves every extraction anchor on fixtures (fence-aware
      # section slicing, the lowercase yes/no Required column, the
      # (default)-tolerant shell enum clause, multi-event no-matcher-support
      # rows, per-type timeout defaults, the
      # documented-vs-observed-in-samples provenance — rewakeMessage +
      # rewakeSummary are sample-only) and cross-checks the projection
      # against the kernel's upstream-base hook-config expectations —
      # agreements AND divergences are printed, and divergences are findings
      # to report, never kernel edits (tier-3 promotion is human,
      # 052-AT-SPEC). CI never refetches: the capture is a one-time
      # build-time fetch; ongoing freshness is the watcher's job.
      - name: Hook-config deep-capture projection freshness + self-test
        run: |
          python3 scripts/extract-hook-config-projection.py --check
          python3 scripts/extract-hook-config-projection.py --self-test

      # Offline + deterministic (061-AT-SPEC): the marketplace-catalog deep
      # capture — the sixth and FINAL contract of the deep-capture program.
      # Like plugin-manifest, agent-definition, and hook-config there is NO
      # machine-readable upstream — the plugin-marketplaces reference page is
      # the spec (the Marketplace-schema Required/Owner/Optional tables + the
      # Reserved-names note, the Plugin-entries Required + Standard-metadata
      # + Component-configuration tables, the Plugin-sources 5-form summary
      # table + four per-type field tables + the sha-beats-ref rule, and the
      # Strict-mode table) and the official catalog itself
      # (anthropics/claude-plugins-official .claude-plugin/marketplace.json,
      # commit-pinned, 223 entries, vendored whole) corroborates it.
      # --check re-extracts the normative projection from the vendored
      # snapshots (specs/_vendor/upstream/marketplace-catalog/) and fails if
      # the committed projection.json is stale (it is DERIVED, never
      # hand-edited); the self-test proves every extraction anchor on
      # fixtures (two-level slicing of the duplicated '### Required fields'
      # heading, the three requiredness conventions, the bold-marker
      # sub-tables, the summary-vs-per-type `?`-suffix exact-match, the
      # JSON-example source discriminators, the
      # documented-vs-observed-in-samples provenance — the commit/path
      # source keys and the wordpress.com plugin name are sample-only) and
      # cross-checks the projection against the kernel's upstream-base
      # marketplace-catalog expectations — agreements AND divergences are
      # printed, and divergences are findings to report, never kernel edits
      # (tier-3 promotion is human, 052-AT-SPEC). CI never refetches: the
      # capture is a one-time build-time fetch; ongoing freshness is the
      # watcher's job.
      - name: Marketplace-catalog deep-capture projection freshness + self-test
        run: |
          python3 scripts/extract-marketplace-catalog-projection.py --check
          python3 scripts/extract-marketplace-catalog-projection.py --self-test

      # Offline + deterministic (063-AT-SPEC): the Anthropic leading-indicator
      # (bitter-lesson) watcher. --self-test exercises a new-hit case, a
      # no-change case, a fetch-failure case (typed + alert-only, NEVER a hit),
      # the 2 prose sources' 7-day disposition window, and the full
      # disposition matrix (CONTINUE | NOTE | RETRO | PAUSE | STOP). The live
      # poll runs only in the scheduled cron
      # (.github/workflows/leading-indicator-watch.yml) — CI never hits the
      # network. <5% flake budget: structured sources escalate immediately;
      # prose sources hold 7 days (§ 14.11.3).
      - name: Leading-indicator watcher self-test
        run: python3 scripts/leading-indicator-watch.py --self-test

      # Offline + deterministic (033 § 14.13.1): the SAK dashboard machine
      # renderer. The dashboard is a DERIVED VIEW — SAK-DASHBOARD.md +
      # specs/sak-dashboard.json are rendered from committed state ONLY
      # (SAK-STATE.json hand-maintained slow-moving facts + the leading-indicator
      # registry + the lineage coverage-map projection), never hand-edited.
      # --self-test proves the disposition matrix (CONTINUE|NOTE|RETRO|PAUSE|STOP)
      # on fixtures, the coverage-map derivation, determinism, and the freshness
      # failure modes; --check fails when a committed output is stale vs its
      # sources (re-derived at the committed generated_at — the detector-health /
      # lineage project-coverage --check pattern). If this fails after editing
      # SAK-STATE.json / the indicator registry / the coverage map, regenerate:
      # python3 scripts/render-sak-dashboard.py
      - name: SAK dashboard renderer self-test + freshness
        run: |
          python3 scripts/render-sak-dashboard.py --self-test
          python3 scripts/render-sak-dashboard.py --check

      # The SAK Phase-4 advisory->blocking flip state machine (plan 033 v7
      # § 14.4.shadow + § 14.4c, plan 048 v8 Delta 3 flip preconditions +
      # § 14.31 lifecycle-states). DISTINCT from the 13-entity runtime state
      # machine at specs/state-machines/transition-table.v1.json (statemachine-
      # drift.yml gates that one). --self-test proves legal/illegal transitions,
      # the hard-gate flip preconditions ((c) zero-open-P0 + (d) governance
      # triple sign-off, neither overridable by the calendar ceiling), rollback
      # reachability from each gated state, and emit() immutability on fixtures;
      # --validate asserts the committed SAK-STATE.json satisfies the schema at
      # specs/state-machines/schema/sak-state.schema.json.
      - name: SAK Phase-4 flip state machine self-test + schema validation
        run: |
          python3 scripts/sak-state-machine.py --self-test
          python3 scripts/sak-state-machine.py --validate

      # The SAK Phase-4c rollback protocol (plan 033 v7 § 14.4.rollback class 3 +
      # plan 048 v8 § 14.4c): the kernel-gate-revert command. It drives the
      # Phase-4 state machine (above) to ROLLED-BACK via its existing emit()
      # engine + the load_signoff_from_state seam — it does NOT reimplement
      # state/transition logic. --self-test proves the governance-triple gate
      # (revert refused if CTO/CISO/VP-DevRel sign-off is absent — each seat
      # named), the ROLLED-BACK emit reuse, the 7-calendar-day ISEDC Class-2
      # retrospective_due_at stamping + overdue surfacing, illegal-source-state
      # rejection, and that the emitted ROLLED-BACK state (incl. the rollback
      # block) validates against specs/state-machines/schema/sak-state.schema.json.
      # --check-retrospective surfaces (exit 1) when a stamped retrospective is
      # overdue; against the committed SAK-STATE.json (no rollback recorded) it
      # is NONE -> exit 0, so this is green in steady state.
      - name: SAK Phase-4c rollback protocol (kernel-gate-revert) self-test
        run: |
          python3 scripts/sak-kernel-gate-revert.py --self-test
          python3 scripts/sak-kernel-gate-revert.py --check-retrospective
