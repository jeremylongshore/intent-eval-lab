name: Spec drift watch

# Polls upstream spec sources (Claude Code changelog, npm version, Anthropic
# platform docs, engineering blog, anthropics/skills repo, agentskills.io) and
# reports drift. The eval-set bootstrap (per DR-029) requires an anchored
# snapshot timestamp; without it, every Refiner score delta is indistinguishable
# from upstream spec drift. This workflow IS the anchor.
#
# Authority: 000-docs/030-AT-DECR-eval-set-bootstrap-decisions-2026-05-28.md § 6
#            000-docs/045-RR-LAND-single-source-of-truth-and-continuous-spec-compliance-2026-06-09.md
# Sources + extraction logic: scripts/spec-drift-check.sh (DRY — workflow only
# handles CI side effects, not the polling logic itself).
#
# Four layers (the deterministic detection backbone — never replaced by an LLM):
#   1. byte-hash drift   (spec-drift-check.sh) — "did the page change?"
#   2. field-level diff   — "did the normative SHAPE change?" Two checkers:
#        - spec-projection-diff.py --check           (skill-frontmatter / FF#2)
#        - projection-freshness.py                   (all field-level surfaces, driven by
#          `semantic_coverage` in specs/upstream-surface-registry.v1.json; each surface's
#          extractor runs --check-fresh against the CAPTURED page, and the registry says
#          which surfaces can fail the run)
#   3. liveness guards    (watcher-liveness.py) — so it cannot fail silent-green:
#        - fetch_error_streak >= 3  → a surface is effectively unmonitored → fail loud
#        - dead-man heartbeat       → external ping (true dead-man) + retrospective gap check on resume
#   4. taxonomy-gated capture (fetch-capture.py, 052-AT-SPEC) — every fetch attempt
#      classified FETCH_OK|UNREACHABLE|MOVED|RATELIMITED|SHAPE_CHANGED|TRUNCATED and
#      archived append-only (tier 1 archive/raw/, sha256-deduplicated bodies); ONLY a
#      FETCH_OK record updates the tier-2 vendored snapshot (specs/_vendor/). A bad
#      fetch keeps the last-good snapshot, alerts via ntfy, and NEVER opens a
#      reconciliation issue/PR. A tier-2 promotion additionally appends a
#      snapshot-updated event to the append-only lineage log (specs/lineage/,
#      054-AT-SPEC) and regenerates its derived coverage map.
#
# Side effects on drift / liveness trip:
#   1. Workflow fails (visible red X)
#   2. ntfy push (subscribed on Jeremy's phone)
#   3. GH issue opened with diff summary (auto-deduped by title)
#
# Trigger:
#   - Daily cron at 09:00 UTC
#   - Manual workflow_dispatch
#   - PR + push that touches the scripts, snapshots, or vendored projection (self-test)

on:
  schedule:
    - cron: '0 9 * * *'   # daily 09:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/spec-drift-watch.yml'
      - 'scripts/spec-drift-check.sh'
      - 'scripts/spec-projection-diff.py'
      - 'scripts/watcher-liveness.py'
      - 'scripts/fetch-capture.py'
      - 'scripts/lineage-log.py'
      - 'scripts/emit-snapshot-currency.py'
      - 'scripts/projection-freshness.py'
      - 'scripts/lib/**'
      - 'scripts/extract-agent-definition-projection.py'
      - 'scripts/extract-hook-config-projection.py'
      - 'scripts/extract-marketplace-catalog-projection.py'
      - 'scripts/extract-plugin-manifest-projection.py'
      - 'specs/upstream-surface-registry.v1.json'
      - 'specs/lineage/**'
      - 'specs/snapshots/.sha/**'
      - 'specs/_vendor/**'
      - '_vendor/upstream/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/spec-drift-watch.yml'
      - 'scripts/spec-drift-check.sh'
      - 'scripts/spec-projection-diff.py'
      - 'scripts/watcher-liveness.py'
      - 'scripts/fetch-capture.py'
      - 'scripts/lineage-log.py'
      - 'scripts/emit-snapshot-currency.py'
      - 'scripts/projection-freshness.py'
      - 'scripts/lib/**'
      - 'scripts/extract-agent-definition-projection.py'
      - 'scripts/extract-hook-config-projection.py'
      - 'scripts/extract-marketplace-catalog-projection.py'
      - 'scripts/extract-plugin-manifest-projection.py'
      - 'specs/upstream-surface-registry.v1.json'
      - 'specs/lineage/**'
      - 'specs/snapshots/.sha/**'
      - 'specs/_vendor/**'
      - '_vendor/upstream/**'

permissions:
  contents: write        # push the bot promotion branch (NOT main — main stays protected)
  issues: write          # for auto-opening drift issues
  pull-requests: write   # open/update the promotion PR that carries every commit-back

jobs:
  spec-drift-check:
    name: Poll spec sources + field-diff + liveness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Single long-lived bot branch carrying every commit-back. Not protected, so
      # the default GITHUB_TOKEN can write it; merged into main via the promotion PR.
      PROMO_BRANCH: spec-drift/auto-promotion
    steps:
      # L1 fix, second cut (supersedes the SPEC_DRIFT_PUSH_TOKEN approach).
      #
      # History: every commit-back used to push straight at main and be rejected
      # GH006 ("9 of 9 required status checks are expected"), so the watcher could
      # detect drift but never persist it. The first fix added an admin/bypass PAT
      # (SPEC_DRIFT_PUSH_TOKEN). It WORKED — bot heartbeats landed daily from
      # 2026-06-29 to 2026-07-06 — and then silently stopped when the PAT expired,
      # taking the spec-currency loop down for 16 days with no alert, on green runs.
      #
      # Chose the PR route over repairing the bypass token because the token is both
      # a supply-chain hole (a durable bot write path past main's required checks, on
      # the repo that DEFINES what a correct artifact is) and operationally fragile
      # (it decays on a credential clock nobody watches — proven above). A PR-opening
      # watcher needs no elevated privilege, never expires, and fails VISIBLY: an
      # unmerged PR is an object you can see, not a ::warning:: on a green run.
      #
      # So: the default GITHUB_TOKEN is deliberate. It cannot push to main, and it
      # does not need to.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # promotion branch is rebuilt from prior state; needs history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cumulative bookkeeping. The promotion branch (below) is the durable home for
      # everything the watcher appends between merges: tier-1 archive records, the
      # lineage log, the currency evidence row, the liveness .state.json, and the
      # detector-health dashboard. Restoring it here — BEFORE fetch-capture appends —
      # is what makes those artifacts accumulate across runs instead of each run
      # starting from whatever main happens to hold.
      #
      # This is also the `.state.json` durability fix: the GH cache below is
      # evictable, so on eviction liveness used to fall back to the committed
      # bootstrap seed and read `last_run_utc: null` forever ("bootstrap (OK)"
      # every run — an inert dead-man). The branch survives eviction. The cache
      # restore that follows is now just the fast path; on a cache hit it overwrites
      # .state.json with a copy of equal freshness, since the same run writes both.
      - name: Restore prior bookkeeping from the promotion branch
        id: restore_promo
        shell: bash
        run: |
          set -uo pipefail
          if ! git fetch --no-tags origin "${PROMO_BRANCH}" 2>/dev/null; then
            echo "No promotion branch yet (${PROMO_BRANCH}) — first run, starting from main."
            echo "restored=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # If the last promotion PR was merged, main already carries this content and
          # is strictly newer. Restoring the branch tip over it would REGRESS the very
          # baseline the merge just advanced — the one bug this whole mechanism exists
          # to prevent. Skip the restore and let main be the base.
          if git merge-base --is-ancestor FETCH_HEAD "origin/${GITHUB_REF_NAME}" 2>/dev/null; then
            echo "Promotion branch is already merged into ${GITHUB_REF_NAME} — main is the fresher base, nothing to restore."
            echo "restored=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # Restore only the bookkeeping paths. specs/_vendor/ is included so a
          # tier-2 promotion that has not been merged yet is not re-proposed as if
          # it were new, and so lineage stays consistent with the snapshot it
          # describes.
          git checkout FETCH_HEAD -- \
            archive/ \
            specs/_vendor/ \
            specs/lineage/ \
            evidence/snapshot-currency/ \
            specs/snapshots/.state.json \
            specs/detector-health.json \
            docs/detector-health.md 2>/dev/null || true
          git reset --quiet
          echo "Restored bookkeeping from ${PROMO_BRANCH}."
          echo "restored=true" >> "${GITHUB_OUTPUT}"

      # Field-level extract-then-diff (Fitness Function #2). Offline: operates on
      # the vendored firewall snapshot + committed projection. --self-test proves
      # the differ is sound (detects every drift class, no false positive);
      # --check proves the snapshot and the committed projection still agree.
      # Persist liveness state (per-surface fetch-error streaks + last_run) across
      # scheduled runs. Cache (not commit-back) avoids branch-protection friction;
      # the committed specs/snapshots/.state.json is the bootstrap seed. Eviction
      # only resets streaks to the seed (the byte/field drift detection is
      # unaffected) — committed belt-and-suspenders state is a tracked follow-on.
      - name: Restore liveness state
        uses: actions/cache/restore@v4
        with:
          path: specs/snapshots/.state.json
          key: spec-drift-state-${{ github.run_id }}
          restore-keys: |
            spec-drift-state-

      - name: Run drift check
        id: check
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          # SINGLE fetch pass emits BOTH the text drift report (stdout → drift-report.txt)
          # and the JSON report (→ drift-report.json that watcher-liveness --record-run
          # consumes for the fetch-error streak). Previously this step ran the check once
          # for text and AGAIN with --json — two separate network passes — so a surface
          # that FETCH_ERRORed on the first pass but recovered on the second reset its
          # liveness streak, and the 3-consecutive-error guard could never fire (a
          # false-green: drift saw the error, liveness saw the recovery). --both makes
          # drift detection and liveness observe the EXACT SAME fetch.
          if scripts/spec-drift-check.sh --both /tmp/drift-report.json > /tmp/drift-report.txt 2>&1; then
            echo "drift=false" >> "${GITHUB_OUTPUT}"
          else
            echo "drift=true" >> "${GITHUB_OUTPUT}"
          fi
          cat /tmp/drift-report.txt

      # Evidence Bundle emit (iel-E07 residual; DR-010 Q3 unification thesis):
      # every gate emits a gate-result/v1 row. The snapshot-currency check IS a
      # gate, so each audit/cron run emits an in-toto Statement recording the
      # verdict ("snapshot still current" = pass, byte-drift = advisory/warn,
      # unobserved surface = advisory/info), schema-bound to @intentsolutions/core
      # schemas/v1/gate-result.schema.json (Blueprint B § 7.4 NORMATIVE). The row
      # is UNSIGNED by design — predicate-URI'd Rekor push is gated on DNSSEC+CAA
      # for evals.intentsolutions.io (CISO binding; iah-E06). Emitting the ROW is
      # the deliverable; signing is a separate gated step (emit-evidence.sh).
      # Runs on schedule/dispatch (it reads the live drift-report.json that the
      # network drift check produced); the offline --self-test below gates PRs.
      - name: Emit snapshot-currency Evidence Bundle row (gate-result/v1)
        id: emit_currency
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          python3 -m pip install --quiet jsonschema referencing 2>/dev/null || true
          if [[ ! -f /tmp/drift-report.json ]]; then
            echo "::warning::drift-report.json absent (drift check did not run) — skipping row emit."
            exit 0
          fi
          python3 scripts/emit-snapshot-currency.py \
            --report /tmp/drift-report.json \
            --evaluated-at "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            --commit-sha "${GITHUB_SHA}" \
            --out evidence/snapshot-currency/gate-result.json
          echo "--- emitted gate-result/v1 row ---"
          cat evidence/snapshot-currency/gate-result.json

      # Offline self-test of the emitter (gates EVERY event incl. PRs, like the
      # projection + capture self-tests): proves the decision mapping + schema
      # conformance against the published kernel gate-result/v1 contract.
      - name: Snapshot-currency emitter self-test (offline, deterministic)
        id: emit_currency_selftest
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          python3 -m pip install --quiet jsonschema referencing 2>/dev/null || true
          if python3 scripts/emit-snapshot-currency.py --self-test; then
            echo "selftest=pass" >> "${GITHUB_OUTPUT}"
          else
            echo "selftest=fail" >> "${GITHUB_OUTPUT}"
          fi

      # Taxonomy-gated capture self-test (052-AT-SPEC): offline, fixtures-driven —
      # proves all 6 statuses classify correctly and the append/dedup/tier-2 gating
      # is sound. Gates every event (a real CI check, like the projection self-test).
      - name: Fetch-capture self-test (offline, deterministic)
        id: capture_selftest
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          if python3 scripts/fetch-capture.py --self-test; then
            echo "selftest=pass" >> "${GITHUB_OUTPUT}"
          else
            echo "selftest=fail" >> "${GITHUB_OUTPUT}"
          fi

      # Tier-1/tier-2 capture (scheduled + manual runs only — a PR must not hit the
      # network or grow the archive). Every fetch attempt appends a raw record under
      # archive/raw/<surface>/ (bodies sha256-deduplicated); ONLY FETCH_OK records
      # update specs/_vendor/<surface>/. A bad fetch leaves the last-good vendored
      # snapshot untouched and surfaces bad_fetch=true for the ntfy alert below —
      # it NEVER feeds the differ and NEVER opens a reconciliation issue.
      - name: Capture raw fetches into the archive tiers
        id: capture
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          if python3 scripts/fetch-capture.py --report /tmp/capture-report.json > /tmp/capture-log.txt 2>&1; then
            echo "bad_fetch=false" >> "${GITHUB_OUTPUT}"
          else
            echo "bad_fetch=true" >> "${GITHUB_OUTPUT}"
          fi
          cat /tmp/capture-log.txt

      # Fitness Function #2 — field-level extract-then-diff.
      #
      # STEP ORDER IS LOAD-BEARING. This must run AFTER the capture above, and it
      # did not used to. The differ reads specs/_vendor/<surface>/snapshot<ext>;
      # running it first meant it only ever saw last run's committed bytes. Combined
      # with its old default of a snapshot hand-vendored on 2026-05-28 that the
      # capture pipeline never writes, BOTH sides of the diff were frozen and
      # "NO semantic drift (0 findings)" was a structural certainty rather than a
      # finding. Capture-then-diff is what makes this check able to fire at all.
      #
      # The FETCH_OK firewall is untouched: fetch-capture.py promotes into
      # specs/_vendor/ only on a good fetch, and the differ still performs no
      # network I/O of its own. On a PR (no capture) this degrades to a consistency
      # check of the committed snapshot↔projection pair, which is the right meaning
      # there.
      - name: Field-level projection diff (skill-frontmatter)
        id: projection
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          # --self-test proves differ soundness (every drift class detected, no
          # false positive). Offline + deterministic — it gates every event.
          if python3 scripts/spec-projection-diff.py --self-test; then
            echo "selftest=pass" >> "${GITHUB_OUTPUT}"
          else
            echo "selftest=fail" >> "${GITHUB_OUTPUT}"
          fi
          python3 scripts/spec-projection-diff.py --check > /tmp/projection-report.txt 2>&1
          rc=$?
          cat /tmp/projection-report.txt
          # Distinguish "the shape changed" (1) from "the differ could not run" (2).
          # Collapsing them would report a missing snapshot or a broken registry as
          # semantic drift, and reconciling a phantom drift is worse than no signal.
          case "${rc}" in
            0) echo "drift=false" >> "${GITHUB_OUTPUT}"; echo "error=false" >> "${GITHUB_OUTPUT}" ;;
            1) echo "drift=true"  >> "${GITHUB_OUTPUT}"; echo "error=false" >> "${GITHUB_OUTPUT}" ;;
            *) echo "drift=false" >> "${GITHUB_OUTPUT}"; echo "error=true"  >> "${GITHUB_OUTPUT}"
               echo "::error::spec-projection-diff --check could not run (exit ${rc}) — the semantic gate did NOT execute this run." ;;
          esac

      # The other four deep-capture contracts. STEP ORDER IS LOAD-BEARING for the
      # same reason as the step above: this must run AFTER the capture.
      #
      # Those four contracts have had extractors wired into ci.yml since
      # 2026-06-12, under steps titled "…projection freshness", all green. They
      # were never freshness checks. `--check` re-extracts from
      # specs/_vendor/upstream/<contract>/ — a hand-vendored tree fetch-capture.py
      # cannot write (`upstream` is not a surface id) — and compares against the
      # projection derived from those same bytes. Frozen vs frozen is green by
      # construction. The design always said otherwise; the extractors' own
      # comments read "ongoing freshness is the watcher's job". This is that job,
      # finally wired: --check-fresh repoints ONLY the parsed reference doc at
      # specs/_vendor/<surface>/snapshot<ext>. `--check` in ci.yml is untouched and
      # keeps its (correct, narrower) self-consistency meaning.
      #
      # Which surfaces run, and which of them can fail this step, is read from
      # semantic_coverage in specs/upstream-surface-registry.v1.json — so a
      # surface is promoted from report-only to enforced by a one-line registry
      # edit that shows up in review, not by editing CI. Surfaces still carrying
      # undispositioned findings stay report-only deliberately: a permanently-red
      # lane gets ignored, which is how byte-drift alerting ended up gated off in
      # the first place.
      #
      # The driver re-runs the skill-frontmatter checker above so its report covers
      # all five field-level surfaces rather than four; the dedicated step above
      # remains the one whose outputs drive the issue / notification machinery.
      - name: Field-level projection freshness (all contracts, registry-driven)
        id: freshness
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          python3 scripts/projection-freshness.py > /tmp/freshness-report.txt 2>&1
          rc=$?
          cat /tmp/freshness-report.txt
          # 0 clean / 1 drift / 2 inoperable — kept distinct. An inoperable gate is
          # as red as a failing one: a gate that did not run is not a gate that passed.
          case "${rc}" in
            0) echo "drift=false" >> "${GITHUB_OUTPUT}"; echo "error=false" >> "${GITHUB_OUTPUT}" ;;
            1) echo "drift=true"  >> "${GITHUB_OUTPUT}"; echo "error=false" >> "${GITHUB_OUTPUT}" ;;
            *) echo "drift=false" >> "${GITHUB_OUTPUT}"; echo "error=true"  >> "${GITHUB_OUTPUT}"
               echo "::error::projection-freshness could not run (exit ${rc}) — the multi-contract semantic gate did NOT execute this run." ;;
          esac

      # Persist the appended archive records + any tier-2 promotion, plus the
      # lineage log + its derived coverage map (a tier-2 promotion appends a
      # snapshot-updated event and regenerates the projection — 054-AT-SPEC).
      # Append-only by construction: fetch-capture.py never deletes or rewrites
      # an existing record, and lineage-log.py append refuses any prefix change.
      # That property is enforced by the SCRIPTS, not by git history, which is why
      # the promotion branch below can be force-updated without weakening it.
      #
      # Commit only — the single push happens once, at the end, onto the promotion
      # branch. [skip ci] keeps the bot commit from re-triggering doc/CI workflows.
      - name: Commit archive tiers (append-only)
        id: archive_commit
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain archive/ specs/_vendor/ specs/lineage/ evidence/snapshot-currency/ 2>/dev/null)" ]]; then
            echo "No archive/vendored/lineage/evidence changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/ specs/_vendor/ specs/lineage/ evidence/snapshot-currency/
          git commit -m "chore(spec-archive): capture $(date -u +%Y-%m-%dT%H:%MZ) raw fetches + currency row [skip ci]"
          echo "committed=true" >> "${GITHUB_OUTPUT}"

      # Dead-man heartbeat (true, external): ping an uptime monitor so absence of
      # a daily ping alerts even when the cron itself stops firing. Optional
      # secret — if unset, skip (the retrospective gap check + record-run remain).
      - name: Heartbeat ping (external dead-man)
        if: github.event_name == 'schedule'
        shell: bash
        env:
          HEARTBEAT_URL: ${{ secrets.SPEC_DRIFT_HEARTBEAT_URL }}
        run: |
          if [[ -z "${HEARTBEAT_URL:-}" ]]; then
            echo "SPEC_DRIFT_HEARTBEAT_URL not set; external dead-man ping skipped."
            exit 0
          fi
          curl -fsSL -m 10 "${HEARTBEAT_URL}" >/dev/null && echo "heartbeat ping sent." || echo "heartbeat ping failed (non-fatal)."

      # Retrospective gap check: on resume after an outage, the first run detects
      # that monitoring lapsed (last recorded run > 26h ago).
      - name: Dead-man heartbeat (retrospective gap check)
        id: heartbeat
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          if python3 scripts/watcher-liveness.py --heartbeat-check; then
            echo "stale=false" >> "${GITHUB_OUTPUT}"
          else
            echo "stale=true" >> "${GITHUB_OUTPUT}"
          fi

      # Update per-surface fetch-error streaks + last_run timestamp; fails loud if
      # any surface has errored >= 3 consecutive runs (effectively unmonitored).
      - name: Record run + check fetch-error streaks
        id: streak
        shell: bash
        continue-on-error: true
        run: |
          set -uo pipefail
          if python3 scripts/watcher-liveness.py --record-run /tmp/drift-report.json > /tmp/streak-report.txt 2>&1; then
            echo "exceeded=false" >> "${GITHUB_OUTPUT}"
          else
            echo "exceeded=true" >> "${GITHUB_OUTPUT}"
          fi
          cat /tmp/streak-report.txt

      - name: Save liveness state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: specs/snapshots/.state.json
          key: spec-drift-state-${{ github.run_id }}

      # Durable liveness (L1 fix, 692-AA-AACR § 0.5). The cache above is ephemeral:
      # on GH-cache eviction the restore falls back to the committed bootstrap seed,
      # which stayed `last_run_utc: null` because no commit-back ever landed — so
      # `watcher-liveness.py --heartbeat-check` read null and printed "bootstrap …
      # (OK)" forever, the dead-man heartbeat was inert, and the dashboard read
      # DEGRADED even while the watcher was live. Committing the freshly-recorded
      # .state.json makes the seed ADVANCE each run, so the heartbeat survives
      # eviction and the committed last_run_utc is provable proof-of-life.
      #
      # Durability now comes from the promotion BRANCH (restored at the top of this
      # job), not from an admin push at main. That is what lets a persistence-based
      # alert — "drifted N consecutive runs with no baseline advance" — have a
      # counter that does not reset to zero on every cache eviction.
      - name: Commit liveness heartbeat (durable dead-man)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain specs/snapshots/.state.json 2>/dev/null)" ]]; then
            echo "No liveness-state change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add specs/snapshots/.state.json
          git commit -m "chore(spec-drift): liveness heartbeat $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"

      - name: Summarize
        if: always()
        shell: bash
        run: |
          {
            echo "## Spec drift watch"
            echo ""
            echo "| Layer | Status |"
            echo "|---|---|"
            echo "| byte-hash drift | ${{ steps.check.outputs.drift }} |"
            echo "| field-level projection drift (skill-frontmatter) | ${{ steps.projection.outputs.drift }} |"
            echo "| field-level projection freshness (enforced surfaces) | drift=${{ steps.freshness.outputs.drift }} inoperable=${{ steps.freshness.outputs.error }} |"
            echo "| dead-man heartbeat stale | ${{ steps.heartbeat.outputs.stale }} |"
            echo "| fetch-error streak exceeded | ${{ steps.streak.outputs.exceeded }} |"
            echo "| capture self-test | ${{ steps.capture_selftest.outputs.selftest }} |"
            echo "| capture bad fetch (taxonomy) | ${{ steps.capture.outputs.bad_fetch }} |"
            echo "| snapshot-currency emitter self-test | ${{ steps.emit_currency_selftest.outputs.selftest }} |"
            echo ""
            if [[ -f evidence/snapshot-currency/gate-result.json ]]; then
              echo "### Snapshot-currency gate-result/v1 row"
              echo '```json'
              cat evidence/snapshot-currency/gate-result.json
              echo '```'
              echo ""
            fi
            echo "### Byte-hash report"
            echo '```'
            cat /tmp/drift-report.txt
            echo '```'
            echo "### Field-level projection report (skill-frontmatter)"
            echo '```'
            cat /tmp/projection-report.txt 2>/dev/null || true
            echo '```'
            echo "### Field-level projection freshness (all contracts, registry-driven)"
            echo '```'
            cat /tmp/freshness-report.txt 2>/dev/null || echo "(freshness driver did not produce a report)"
            echo '```'
            echo "### Capture report (tier-1/tier-2)"
            echo '```'
            cat /tmp/capture-log.txt 2>/dev/null || echo "(capture runs on schedule/dispatch only)"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      # bad_fetch is in THIS condition (alert) but deliberately NOT in the
      # issue-open condition below — a bad fetch never opens a reconciliation
      # issue/PR (052-AT-SPEC: only FETCH_OK output feeds anything downstream).
      - name: Fire ntfy notification on drift, liveness trip, or bad fetch
        if: >-
          github.event_name == 'schedule' &&
          (steps.projection.outputs.drift == 'true' ||
           steps.freshness.outputs.drift == 'true' ||
           steps.freshness.outputs.error == 'true' ||
           steps.heartbeat.outputs.stale == 'true' ||
           steps.streak.outputs.exceeded == 'true' ||
           steps.capture.outputs.bad_fetch == 'true')
        shell: bash
        run: |
          if [[ -z "${NTFY_URL:-}" ]]; then
            echo "NTFY_URL secret not set; skipping ntfy push."
            exit 0
          fi
          {
            echo "byte-drift=${{ steps.check.outputs.drift }} field-drift=${{ steps.projection.outputs.drift }} freshness-drift=${{ steps.freshness.outputs.drift }} freshness-error=${{ steps.freshness.outputs.error }} heartbeat-stale=${{ steps.heartbeat.outputs.stale }} streak-exceeded=${{ steps.streak.outputs.exceeded }} bad-fetch=${{ steps.capture.outputs.bad_fetch }}"
            head -10 /tmp/drift-report.txt
            sed -n '/─── Summary/,$p' /tmp/freshness-report.txt 2>/dev/null | head -12 || true
            grep -v FETCH_OK /tmp/capture-log.txt 2>/dev/null | head -6 || true
          } > /tmp/ntfy-body.txt
          curl -fsSL \
            -H "Title: Spec drift / liveness (intent-eval-lab)" \
            -H "Priority: high" \
            -H "Tags: warning,page_facing_up" \
            -d "$(cat /tmp/ntfy-body.txt)" \
            "${NTFY_URL}/prod-health" || echo "ntfy push failed (non-fatal)"
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}

      - name: Open or update drift issue
        if: >-
          github.event_name == 'schedule' &&
          (steps.projection.outputs.drift == 'true' ||
           steps.freshness.outputs.drift == 'true' ||
           steps.heartbeat.outputs.stale == 'true' ||
           steps.streak.outputs.exceeded == 'true')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="Spec drift detected — $(date -u +%Y-%m-%d)"
          existing=$(gh issue list --state open --search "in:title \"Spec drift detected\"" --json number,title --jq '.[] | select(.title | startswith("Spec drift detected — '"$(date -u +%Y-%m-%d)"'")) | .number' | head -1)
          if [[ -n "${existing}" ]]; then
            echo "Already opened issue #${existing} today; skipping duplicate."
            exit 0
          fi
          body=$(cat <<EOF
          spec-drift-watch detected field-level (semantic) drift or a liveness trip (byte-hash churn alone no longer alerts).

          - byte-hash drift: ${{ steps.check.outputs.drift }}
          - field-level projection drift: ${{ steps.projection.outputs.drift }}
          - dead-man heartbeat stale: ${{ steps.heartbeat.outputs.stale }}
          - fetch-error streak exceeded: ${{ steps.streak.outputs.exceeded }}

          See workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          ## Byte-hash report

          \`\`\`
          $(cat /tmp/drift-report.txt)
          \`\`\`

          ## Field-level projection report

          \`\`\`
          $(cat /tmp/projection-report.txt 2>/dev/null || echo "(none)")
          \`\`\`

          ## Next steps

          1. Inspect the drifted source(s). For a field-level drift, the normative SHAPE changed (a field added/removed, a required/experimental flag flipped) — that is the load-bearing signal.
          2. If material: re-vendor the snapshot under \`_vendor/upstream/<contract>/\`, refresh its \`projection.v1.json\`, then promote the change into the kernel (@intentsolutions/core authoring/v1). The differ never authors a kernel edit and never closes this signal — a human reconciles.
          3. If immaterial (extractor flake / noise): tighten the extractor, then refresh the baseline.
          4. A fetch-error streak means a surface URL moved or the extractor broke — fix the URL/extractor.

          ## Authority

          - DR-029 § 6 + DR-044: \`000-docs/030-...md\`, \`000-docs/044-...md\`
          - SSoT + Continuous Spec-Compliance: \`000-docs/045-RR-LAND-...md\`

          - Jeremy Longshore
          intentsolutions.io
          EOF
          )
          gh issue create \
            --title "${TITLE}" \
            --body "${body}" \
            --label "spec-drift" \
            --label "refiner"

      # Offline-deterministic gates fail on EVERY event (they are real CI checks of
      # the differ + snapshot↔projection consistency + the capture taxonomy):
      # self-test soundness + --check + fetch-capture --self-test.
      - name: Fail on projection / capture / currency self-test or consistency failure (all events)
        if: >-
          steps.projection.outputs.selftest == 'fail' ||
          steps.projection.outputs.drift == 'true' ||
          steps.projection.outputs.error == 'true' ||
          steps.freshness.outputs.drift == 'true' ||
          steps.freshness.outputs.error == 'true' ||
          steps.capture_selftest.outputs.selftest == 'fail' ||
          steps.emit_currency_selftest.outputs.selftest == 'fail'
        run: |
          # `projection.outputs.error` and `freshness.outputs.error` are in this
          # list deliberately: a differ that CANNOT RUN must be as red as a differ
          # that found drift. Treating an inoperable gate as a pass is the precise
          # shape of the six-week silence this workflow is being repaired from.
          #
          # `freshness.outputs.drift` fails on EVERY event, not only on schedule,
          # and that is the point: it can only be true for a surface the registry
          # marks `failing`, and on a PR both operands are committed files. So the
          # red lands on the promotion PR that introduces the drifted capture —
          # attached to the change that caused it, where a human either reconciles
          # it or flips that surface to report-only with a disposition note. main
          # therefore never carries a red freshness state, which is what keeps this
          # from becoming a lane people learn to ignore.
          echo "::error::Offline gate failed (projection self-test/consistency/executability, fetch-capture taxonomy self-test, or snapshot-currency emitter self-test)."
          exit 1

      # Live / stateful monitoring gates fail only on the scheduled run (a PR
      # self-test must not red on genuine upstream byte-drift it didn't cause).
      - name: Fail on live drift or liveness trip (scheduled run)
        if: >-
          github.event_name == 'schedule' &&
          (steps.heartbeat.outputs.stale == 'true' ||
           steps.streak.outputs.exceeded == 'true')
        run: |
          echo "::error::Spec drift or liveness trip detected — see report above + auto-opened issue."
          exit 1

      # Detector-health composite dashboard (057-AT-SPEC, Gregg correction):
      # re-derive specs/detector-health.json + docs/detector-health.md from the
      # state this run just updated (record-run above) and commit them back
      # append-only TOGETHER WITH the liveness state they summarize — ci.yml's
      # freshness gate compares committed output against committed sources, so
      # the two must advance in the same commit (committing .state.json is also
      # the belt-and-suspenders persistence flagged at the cache-restore step).
      # if: always() so the dashboard flips to DEGRADED-and-committed on
      # exactly the runs where a gate above failed — health must lead,
      # especially on red days.
      - name: Regenerate + commit detector-health dashboard (append-only)
        if: >-
          always() &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/detector-health.py
          if [[ -z "$(git status --porcelain specs/detector-health.json docs/detector-health.md specs/snapshots/.state.json 2>/dev/null)" ]]; then
            echo "Detector-health dashboard unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add specs/detector-health.json docs/detector-health.md specs/snapshots/.state.json
          git commit -m "chore(detector-health): refresh composite dashboard $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"

      # ---------------------------------------------------------------------------
      # The single persistence point. Everything above COMMITS; nothing above
      # PUSHES. Here we publish those commits on an unprotected bot branch and
      # open/refresh one PR against main.
      #
      # Why a branch + PR rather than a push at main (see the Checkout comment for
      # the token history):
      #   - main stays protected; no bot ever writes past a required check.
      #   - every spec advance becomes reviewable, which the human field-level
      #     reconciliation gate requires anyway before anything reaches the kernel.
      #   - it fails VISIBLY. An unmerged PR is an object; the old failure mode was
      #     a ::warning:: annotation on a green run, which is how 11 drifted
      #     surfaces went unreported for six weeks.
      #
      # Force-push is correct here and does not weaken the append-only guarantee:
      # the branch is rebuilt each run from main + the bookkeeping restored at the
      # top of this job, so its CONTENT is strictly cumulative, and append-only is
      # enforced by fetch-capture.py / lineage-log.py refusing to rewrite records —
      # not by the immutability of a bot branch's history. Only this workflow ever
      # writes this ref.
      #
      # PR creation is best-effort. If the repo forbids Actions from opening PRs,
      # the branch push still persisted everything — strictly better than the old
      # artifact fallback — and we say so loudly instead of going quietly green.
      - name: Publish promotion branch + open/update the promotion PR
        id: promote
        if: >-
          always() &&
          (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          if [[ -z "$(git log --oneline "origin/${GITHUB_REF_NAME}..HEAD" 2>/dev/null)" ]]; then
            echo "No new commit-backs this run."
            echo "promoted=false" >> "${GITHUB_OUTPUT}"
          else
            git branch --force "${PROMO_BRANCH}" HEAD
            if ! git push --force origin "${PROMO_BRANCH}"; then
              echo "::error::promotion branch push FAILED — this run's capture, lineage, currency row and liveness heartbeat did not persist."
              echo "promoted=false" >> "${GITHUB_OUTPUT}"
              echo "push_failed=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "promoted=true" >> "${GITHUB_OUTPUT}"
          fi

          # Ensuring the PR exists is INDEPENDENT of whether this run produced
          # commits, and that separation is load-bearing.
          #
          # These are two different failure modes: the push can succeed while
          # `gh pr create` fails (it did — "GitHub Actions is not permitted to
          # create or approve pull requests", a repo setting). When PR creation
          # lived inside the has-new-commits branch, that left the content
          # persisted on a branch with no PR, and the NEXT quiet run — nothing new
          # to capture — took the early exit and never retried. The promotion would
          # sit unreviewed and unmerged until someone happened to look at the
          # branch list, which is the same silent-stall this whole mechanism exists
          # to remove.
          #
          # So: retry on every run for as long as the branch is ahead of the base.
          git fetch --no-tags origin "${PROMO_BRANCH}" 2>/dev/null || true
          if ! git rev-parse --verify --quiet FETCH_HEAD >/dev/null; then
            echo "No promotion branch on the remote — nothing to open a PR for."
            exit 0
          fi
          if git merge-base --is-ancestor FETCH_HEAD "origin/${GITHUB_REF_NAME}" 2>/dev/null; then
            echo "Promotion branch is not ahead of ${GITHUB_REF_NAME} — nothing to review."
            exit 0
          fi

          existing="$(gh pr list --head "${PROMO_BRANCH}" --base "${GITHUB_REF_NAME}" \
                        --state open --json number --jq '.[0].number' 2>/dev/null || true)"
          if [[ -n "${existing}" ]]; then
            echo "Promotion PR #${existing} already open — branch updated in place."
            echo "pr=${existing}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          body_file="$(mktemp)"
          {
            echo "Automated spec-currency promotion opened by \`spec-drift-watch\`."
            echo
            echo "Carries the watcher's commit-backs: tier-1 archive records, any tier-2"
            echo "vendored-snapshot promotion, the append-only lineage log, the"
            echo "snapshot-currency evidence row, the liveness heartbeat, and the"
            echo "detector-health dashboard."
            echo
            echo "**Review this as a spec advance, not as bookkeeping.** Merging it moves the"
            echo "baseline that every downstream validator treats as normative. Check what"
            echo "actually changed shape before merging; prefer under-folding to over-folding."
            echo
            echo "The branch is force-updated by each scheduled run, so this PR stays current"
            echo "until it is merged. Do not push to it by hand."
            echo
            echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "- Jeremy Longshore"
            echo "intentsolutions.io"
          } > "${body_file}"

          if pr_url="$(gh pr create --base "${GITHUB_REF_NAME}" --head "${PROMO_BRANCH}" \
                --title "chore(spec-drift): promote captured upstream snapshots + watcher state" \
                --body-file "${body_file}" 2>&1)"; then
            echo "Opened promotion PR: ${pr_url}"
          else
            echo "::warning::promotion branch pushed, but opening the PR failed — review and merge ${PROMO_BRANCH} by hand. Detail: ${pr_url}"
          fi

      - name: Upload promotion delta artifact (branch-push failure fallback)
        if: always() && steps.promote.outputs.push_failed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: spec-archive-delta-${{ github.run_id }}
          path: |
            archive/
            specs/_vendor/
            specs/lineage/
            evidence/snapshot-currency/
            specs/snapshots/.state.json
