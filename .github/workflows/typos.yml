name: Typos

# Spell-check lane for intent-eval-lab (REQUIRED gate).
#
# Part of iep-typos-rollout (uska) across all 5 IEP repos. This lane runs
# crate-ci/typos over the tree to surface real spelling mistakes in prose,
# code comments, and identifiers.
#
# Domain terms that are not typos (iep, isedc, iec, iel, iah, iar, iaj, sops,
# sigstore, rekor, zod, etc.) plus truncated hash digests, opaque bead handles,
# citation surnames, and deliberate domain spellings are allow-listed in
# .typos.toml at repo root, as are vendored/generated/data-snapshot paths
# (node_modules, dist, _vendor, .beads, .audit-harness, *-data.json).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: typos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run typos
        uses: crate-ci/typos@v1.29.4
        with:
          config: .typos.toml
