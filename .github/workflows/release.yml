name: Release

# Tag a spec release of intent-eval-lab and emit its signed spec-integrity
# evidence for the intent-eval-dashboard reports hub (bead nr75.13).
#
# The lab has NO package.json / no npm publish — a "release" here is: cut a
# GitHub Release for the tag, then emit + cosign-sign a kernel gate-result/v1
# report-manifest and attach it to that Release. The dashboard fetches:
#   https://github.com/jeremylongshore/intent-eval-lab/releases/latest/download/report-manifest.json
# and re-verifies OIDC subject + workflow_ref + Rekor inclusion + DSSE + kernel
# schema at ingest. The signing identity is this workflow's reusable-workflow ref
# (release.yml@refs/tags/vX.Y.Z) — which the dashboard pins for `iel`.
#
# @intentsolutions/core is installed CI-only via `npm i --no-save`; the lab keeps
# no node manifest. The emit scripts run under Node 22 `--experimental-strip-types`
# (no build step).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # create the Release + upload the manifest asset
  id-token: write  # cosign keyless (Fulcio OIDC)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-and-emit:
    name: Release + emit signed spec-integrity evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node >= 22.6 — the emit scripts run under --experimental-strip-types.
          node-version: 22

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" --title "intent-eval-lab $tag" --generate-notes --latest
          fi

      # CI-only kernel install — the lab keeps no node manifest (zero footprint).
      - name: Install kernel validators (CI-only, --no-save)
        run: npm i --no-save @intentsolutions/core@0.2.0

      - name: Emit-evidence self-check (kernel-valid + canonical-stable)
        run: node --experimental-strip-types ci/emit-evidence.ts --self-check

      - name: Emit gate-result/v1 EvidenceBundle(s)
        run: node --experimental-strip-types ci/emit-evidence.ts --out build/evidence --ref "${GITHUB_REF}"

      - name: Sign each EvidenceBundle (cosign keyless → Rekor)
        run: |
          set -euo pipefail
          shopt -s nullglob
          signed=0
          for bundle in build/evidence/bundle-*.json; do
            case "$bundle" in *.sigstore.json) continue;; esac
            sig="${bundle%.json}.sigstore.json"
            echo "::group::cosign sign-blob $bundle"
            cosign sign-blob --yes --new-bundle-format --bundle "$sig" "$bundle"
            echo "::endgroup::"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::no EvidenceBundles were produced to sign"
            exit 1
          fi
          echo "✓ signed $signed bundle(s)"

      - name: Assemble report-manifest.json (fail-closed on shape mismatch)
        run: node --experimental-strip-types ci/assemble-manifest.ts --dir build/evidence --out build/evidence/report-manifest.json

      - name: Publish report-manifest.json onto the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag" build/evidence/report-manifest.json --clobber
          echo "✓ report-manifest.json published to release $tag"

  # Failure-only alert: if the tag-release job fails, push a ntfy alert over the
  # tailnet to the prod-deploys topic. Tag-triggered only — never runs on a PR.
  alert-on-failure:
    name: alert-on-failure
    needs: [release-and-emit]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Connect to tailnet (Tailscale OIDC)
        uses: tailscale/github-action@v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OIDC_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Wait for tailnet
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            if sudo tailscale ping --c 1 --timeout 2s 100.88.144.55 >/dev/null 2>&1; then
              echo "✓ tailnet reachable (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "::error::tailnet host 100.88.144.55 unreachable after 20 attempts"
          exit 1

      - name: Notify ntfy
        env:
          NTFY_AUTH_TOKEN: ${{ secrets.NTFY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -m 10 -X POST \
            -H "Title: [intent-eval-lab] Release CI FAILED" \
            -H "Priority: high" \
            -H "Tags: prod-deploys,rotating_light" \
            -H "Authorization: Bearer ${NTFY_AUTH_TOKEN}" \
            --data "Release CI failed on ${GITHUB_REF_NAME} (sha ${GITHUB_SHA}). Run: ${run_url}" \
            http://intentsolutions:8080/prod-deploys

  notify-umbrella-changelog:
    name: Notify umbrella to regenerate the platform changelog
    needs: [release-and-emit]
    runs-on: ubuntu-latest
    continue-on-error: true # best-effort; the umbrella's daily schedule is the backstop
    permissions:
      contents: read
    steps:
      - name: Dispatch release-published to the platform umbrella
        env:
          DISPATCH_TOKEN: ${{ secrets.UMBRELLA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "UMBRELLA_DISPATCH_TOKEN not configured — skipping umbrella notify (its daily schedule still picks up this release)."
            exit 0
          fi
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/intent-solutions-io/intent-eval-platform/dispatches \
            -d "{\"event_type\":\"release-published\",\"client_payload\":{\"repo\":\"${GITHUB_REPOSITORY}\",\"ref\":\"${GITHUB_REF_NAME}\"}}"
          echo "Dispatched release-published to intent-solutions-io/intent-eval-platform."
