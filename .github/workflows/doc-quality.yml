name: Doc Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".vale.ini"
      - ".vale/**"
      - "lychee.toml"
      - ".prettierrc.json"
      - ".github/workflows/doc-quality.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: doc-quality-${{ github.ref }}
  cancel-in-progress: true

# Tidy-first posture (per Kent Beck bd memory): all 4 doc-quality gates ADVISORY
# on first install. Tighten to hard-fail in a follow-up PR once the corpus
# is cleaned up. Separates "install the tool" from "fix the violations".
jobs:
  markdownlint:
    name: markdownlint-cli2 (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !.audit-harness
            !node_modules
            !research/phase-a-0-baseline/results/raw
            !research/**/results/**

  vale:
    name: Vale (prose lint, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: errata-ai/vale-action@reviewdog
        with:
          version: 3.9.1
          files: '["000-docs/", "README.md", "CLAUDE.md", "AGENTS.md"]'
          fail_on_error: false
          reporter: github-pr-check

  link-check:
    name: lychee (link integrity, offline, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --config lychee.toml "**/*.md"
          fail: false

  prettier-md:
    name: Prettier (markdown formatting, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install -g prettier@^3.4.0
      - run: prettier --check "**/*.md" --ignore-path .gitignore --ignore-path .prettierignore
