name: Doc Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".vale.ini"
      - ".vale/**"
      - "lychee.toml"
      - ".prettierrc.json"
      - ".github/workflows/doc-quality.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: doc-quality-${{ github.ref }}
  cancel-in-progress: true

# Posture: markdownlint, lychee, and prettier are REQUIRED gates — the corpus is
# clean and the configs (.markdownlint-cli2.jsonc, lychee.toml, .prettierignore)
# scope each gate to authored docs (vendored upstream + frozen audit snapshots +
# the gitignored projects/ symlinks are excluded). Vale stays ADVISORY: prose
# style should never block a code merge.
jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Globs mirror the ignores in .markdownlint-cli2.jsonc so the CI surface
      # equals the local one: vendored upstream snapshots, the gitignored
      # projects/ symlinks, the frozen self-test fixture corpus, and raw research
      # output are not authored prose to lint.
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !.audit-harness
            !node_modules
            !projects
            !_vendor
            !specs/_vendor
            !specs/drift-classification/v1/examples
            !research/phase-a-0-baseline/results/raw
            !research/**/results/**

  vale:
    name: Vale (prose lint, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: errata-ai/vale-action@reviewdog
        with:
          version: 3.9.1
          files: '["000-docs/", "README.md", "CLAUDE.md", "AGENTS.md"]'
          fail_on_error: false
          reporter: github-pr-check

  link-check:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --config lychee.toml "**/*.md"
          fail: true

  prettier-md:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      # Pinned exact so local `prettier --check` matches CI byte-for-byte —
      # prettier's markdown formatting drifts slightly between minor versions.
      - run: npm install -g prettier@3.8.4
      - run: prettier --check "**/*.md" --ignore-path .gitignore --ignore-path .prettierignore
