# Vale config for intent-eval-lab
#
# Prose lint + banned-term enforcement for the spec / methodology / blueprint
# repo. Pairs with the existing partner-name-guard.yml (which uses grep);
# Vale handles the broader prose-quality + house-style surface.
#
# Sync packages via `vale sync` after edits. CI re-syncs on every run.

StylesPath = .vale/styles
MinAlertLevel = warning

# Vocab — accept/reject lists per project. See .vale/styles/Vocab/IS/{accept,reject}.txt
Vocab = IS

[*.md]
BasedOnStyles = Vale

# Vale.Terms is OFF. It enforces ONE canonical casing per vocabulary term, which
# is structurally wrong for this repo's house style: ALL-CAPS carries normative
# emphasis (NORMATIVE, UNBUILT, IMMUTABLES, UNTRUSTED), proper nouns and product
# names have their own casing (AgentSkills, MiniMax, Hermes), acronyms are upper
# (URI, URL, RSS), and any term is capitalized sentence-initially. Measured
# 2026-07-22: 90 of 90 Terms findings were false positives, every one a legitimate
# casing of an accepted term. Worse, the noise REGENERATES — each new accept.txt
# entry immediately produces fresh Terms findings the first time someone starts a
# sentence with it, so this is a permanent condition, not a one-time cleanup.
#
# Vale.Spelling and Vale.Avoid stay ON and are at zero — those produce actionable
# output. Disabling a rule whose entire output is false positives is not gate
# weakening; keeping it is, because a permanently-red lane is one nobody reads.
Vale.Terms = NO

# Skip frontmatter blocks (YAML) — Vale doesn't parse YAML
TokenIgnores = (?s)(^---\n.*?\n---\n)

# Skip code fences + inline code (Vale handles these poorly for spec text)
BlockIgnores = (?s) *(```.*?```)

# ---------------------------------------------------------------------------
# Decision Records and the plan-audit brief-pack preserve VERBATIM seat positions
# per the ISEDC adversarial-integrity protocol (see 000-docs/004, 018, 028). The
# house-style Avoid rule must not ask us to rewrite words a council member
# actually said — the record's value is that it is unedited. Spelling stays on.
# ---------------------------------------------------------------------------
[000-docs/*-AT-DECR-*.md]
Vale.Avoid = NO

[000-docs/audit/**/*.md]
Vale.Avoid = NO
